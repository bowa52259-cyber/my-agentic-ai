<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動學習網頁：空氣污染 - 隱形的威脅</title>
    <!-- 使用 CDN 引入 Tailwind CSS 進行樣式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 Babel 以在瀏覽器中運行 JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- 引入 Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .preserve-3d { transform-style: preserve-3d; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /**
         * ==========================================
         * 模板內容設定區 (LESSON_DATA)
         * ==========================================
         */
        const LESSON_DATA = {
            meta: {
                title: "空氣污染：隱形的威脅",
                subtitle: "從烹飪灶火到化石燃料，空氣污染無所不在",
                series: "Health & Environment",
                mainTitleEn: "AIR POLLUTION: AN INVISIBLE THREAT",
                mainTitleZh: "空氣污染：隱形的威脅"
            },
            // 全文對照數據
            content: [
                {
                    headingEn: "Global Crisis",
                    headingZh: "全球危機",
                    contentEn: "Nearly everyone on Earth—99 percent of the global population—breathes air that is more polluted than the World Health Organization (WHO) guidelines allow. Air pollution causes around 8 million deaths each year, making it one of the leading risks to human health around the world.",
                    contentZh: "地球上幾乎所有人——全球 99% 的人口——呼吸的空氣都比世界衛生組織（WHO）準則所允許的污染更嚴重。空氣污染每年導致約 800 萬人死亡，使其成為全球人類健康面臨的主要風險之一。"
                },
                {
                    headingEn: "Primary Causes",
                    headingZh: "主要成因",
                    contentEn: "Vehicles, industrial production and burning fossil fuels cause outdoor air pollution, while cooking or heating with wood, dung or lamp oil over open fires or simple stoves is the primary cause of household air pollution. Tiny particles released into the air enter the bloodstream and can damage the heart, lungs and other organs.",
                    contentZh: "汽機車、工業生產和燃燒化石燃料造成了戶外空氣污染；而在開放式營火或簡易爐灶上使用木材、糞便或燈油進行烹飪或取暖，則是家庭空氣污染的主要原因。向空氣中釋放的微小顆粒會進入血液，並損害心臟、肺部和其他器官。"
                },
                {
                    headingEn: "Impact on Children",
                    headingZh: "對兒童的衝擊",
                    contentEn: "Tragically, children are especially vulnerable. According to the 2024 State of Global Air report, 709,000 children died of causes related to air pollution in 2021, representing 15 percent of all global deaths of children under 5.",
                    contentZh: "不幸的是，兒童特別容易受害。根據《2024 年全球空氣狀況報告》，2021 年有 70.9 萬名兒童死於與空氣污染相關的原因，佔全球五歲以下兒童死亡總數的 15%。"
                },
                {
                    headingEn: "Clean Energy & Hope",
                    headingZh: "清潔能源與希望",
                    contentEn: "Global awareness and stricter regulations have already cut deaths from household pollution since 1990. Organizations like Clean Cooking Alliance raise money to distribute clean-burning cookstoves in developing countries. Not only are these better for health, but they provide economic benefits by reducing cooking time.",
                    contentZh: "自 1990 年以來，全球意識的提高和更嚴格的規範已經減少了家庭污染導致的死亡。像是「清潔烹飪聯盟」等組織籌集資金在開發中國家分發清潔能源爐灶。這些爐灶不僅對健康更好，還能透過縮短烹飪時間帶來經濟效益。"
                },
                {
                    headingEn: "Individual Steps",
                    headingZh: "個人的力量",
                    contentEn: "Individuals can take simple steps to improve air quality, such as planting air-purifying plants, using air purifiers, and switching to natural cleaning products. Clean air shouldn't be a luxury—it's a basic human right that we can all help safeguard.",
                    contentZh: "個人可以採取簡單的步驟來改善空氣品質，例如種植淨化空氣的植物、使用空氣清淨機，以及換用天然清潔產品。乾淨的空氣不應該是奢侈品——它是我們每個人都可以協助捍衛的基本人權。"
                }
            ],
            // 單字清單
            vocabulary: [
                { word: "guideline", pos: "n.", ipa: "/ˈɡaɪd.laɪn/", trans: "指導方針、準則", exEn: "The company issued new safety guidelines for all employees.", exZh: "公司為所有員工發布了新的安全準則。" },
                { word: "mortality", pos: "n.", ipa: "/mɔːrˈtæl.ə.t̬i/", trans: "死亡率、死亡數", exEn: "Improved medical care has significantly reduced infant mortality.", exZh: "醫療條件的改善顯著降低了嬰兒死亡率。" },
                { word: "particle", pos: "n.", ipa: "/ˈpɑːr.t̬ɪ.kəl/", trans: "微粒、顆粒", exEn: "Dust particles in the air can trigger allergic reactions.", exZh: "空氣中的塵埃微粒會引發過敏反應。" },
                { word: "chronic", pos: "adj.", ipa: "/ˈkrɑː.nɪk/", trans: "慢性的、長期的", exEn: "He suffers from chronic back pain due to years of heavy lifting.", exZh: "由於多年搬運重物，他患有慢性背痛。" },
                { word: "awareness", pos: "n.", ipa: "/əˈwer.nəs/", trans: "意識、察覺", exEn: "The campaign aims to raise public awareness of climate change.", exZh: "這項活動旨在提高大眾對氣候變遷的意識。" },
                { word: "utilize", pos: "v.", ipa: "/ˈjuː.t̬əl.aɪz/", trans: "利用、使用", exEn: "The library utilizes a modern digital system to track books.", exZh: "圖書館利用現代數位系統來追蹤書籍。" },
                { word: "purify", pos: "v.", ipa: "/ˈpjʊr.ə.faɪ/", trans: "淨化、使純淨", exEn: "This filter is designed to purify drinking water.", exZh: "這個濾水器是設計用來淨化飲用水的。" },
                { word: "safeguard", pos: "v.", ipa: "/ˈseɪf.ɡɑːrd/", trans: "保護、捍衛", exEn: "We must take action to safeguard our environment.", exZh: "我們必須採取行動為子孫後代守護環境。" },
                { word: "invisible", pos: "adj.", ipa: "/ɪnˈvɪz.ə.bəl/", trans: "隱形的、看不見的", exEn: "Many gases in the atmosphere are invisible to the human eye.", exZh: "大氣中的許多氣體是肉眼看不見的。" },
                { word: "respiratory", pos: "adj.", ipa: "/ˈres.pə.rə.tɔːr.i/", trans: "呼吸的", exEn: "Masks can help protect our respiratory system from pollution.", exZh: "口罩可以保護我們的呼吸系統不受污染。" }
            ],
            // 文法重點
            grammar: [
                {
                    title: "Not only... but (also)... 倒裝句",
                    desc: "當 Not only 置於句首時，主句需進行「主詞與動詞倒裝」。",
                    exEn: "Not only are these cookstoves better for health, but they provide economic benefits.",
                    exZh: "這些爐灶不僅對健康更好，而且還能提供經濟效益。"
                },
                {
                    title: "倍數表達法 (Multiple Comparison)",
                    desc: "倍數 + the + 名詞 + of... 用來描述兩者之間的差距倍數。",
                    exEn: "They are suffering almost eight times the mortality rates of high-income countries.",
                    exZh: "他們的死亡率幾乎是高收入國家的八倍。"
                },
                {
                    title: "分詞結構省略 (Participle Phrases)",
                    desc: "當連接詞引導的子句主詞與主句一致時，可簡化為分詞結構。",
                    exEn: "Once breathed into the lungs, these particles enter the bloodstream.",
                    exZh: "一旦被吸入肺部，這些顆粒就會進入血液。"
                }
            ],
            // 測驗題目
            quiz: [
                {
                    question: "According to the article, what is the primary cause of household air pollution in LMICs?",
                    options: [
                        "Industrial chemical plants.",
                        "Cooking or heating with wood or dung over open fires.",
                        "Using electronic air purifiers.",
                        "Switching out chemical cleaning products."
                    ],
                    correctIndex: 1,
                    explanation: "正確答案是 (B)。文中提到開發中國家的家庭污染主因是燃燒木材或糞便烹飪。"
                },
                {
                    question: "Air pollution is responsible for about 1 ____ 10 deaths worldwide.",
                    options: [
                        "on",
                        "in",
                        "at",
                        "by"
                    ],
                    correctIndex: 1,
                    explanation: "正確答案是 (B)。「1 in 10」是常見的比例表達方式，意指「每十個中有一個」。"
                },
                {
                    question: "Translate: '我們應該採取行動來捍衛我們的基本權利。'",
                    options: [
                        "We should purify our basic rights.",
                        "We should utilize our basic rights.",
                        "We should safeguard our basic rights.",
                        "We should invisible our basic rights."
                    ],
                    correctIndex: 2,
                    explanation: "正確答案是 (C)。safeguard 代表「捍衛、保護」。"
                }
            ]
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('article');
            const [cardIndex, setCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [quizAnswers, setQuizAnswers] = useState({});
            const [showScore, setShowScore] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);

            const handleSpeak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.onstart = () => setIsSpeaking(true);
                    utterance.onend = () => setIsSpeaking(false);
                    window.speechSynthesis.speak(utterance);
                }
            };

            const stopSpeaking = () => {
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
            };

            return (
                <div className="min-h-screen p-2 md:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-6 text-center">
                            <h1 className="text-3xl md:text-4xl font-bold text-indigo-700 mb-2">{LESSON_DATA.meta.title}</h1>
                            <p className="text-slate-500 italic">{LESSON_DATA.meta.subtitle}</p>
                        </header>

                        <nav className="flex flex-wrap gap-1 mb-6 border-b border-slate-200 overflow-x-auto whitespace-nowrap scrollbar-hide">
                            {[
                                { id: 'article', label: '原文閱讀', icon: 'book-open' },
                                { id: 'translation', label: '全文對照', icon: 'languages' },
                                { id: 'vocab_list', label: '重點單字', icon: 'list' },
                                { id: 'flashcards', label: '翻卡練習', icon: 'id-card' },
                                { id: 'grammar', label: '文法重點', icon: 'graduation-cap' },
                                { id: 'quiz', label: '互動測驗', icon: 'check-circle' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-4 py-3 text-sm font-medium border-b-2 transition-colors ${activeTab === tab.id ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-indigo-500'}`}>
                                    <Icon name={tab.icon} /> {tab.label}
                                </button>
                            ))}
                        </nav>

                        <main className="bg-white rounded-2xl shadow-md p-4 md:p-8 min-h-[600px]">
                            {activeTab === 'article' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-500">
                                        <div>
                                            <p className="font-bold text-indigo-900">{LESSON_DATA.meta.series}</p>
                                            <h2 className="text-2xl font-bold text-indigo-800">{LESSON_DATA.meta.mainTitleEn}</h2>
                                        </div>
                                        <button onClick={() => isSpeaking ? stopSpeaking() : handleSpeak(LESSON_DATA.content.map(s => `${s.headingEn}. ${s.contentEn}`).join(' '))} className={`p-3 rounded-full text-white shadow transition-all ${isSpeaking ? 'bg-red-500 animate-pulse' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                            <Icon name={isSpeaking ? "square" : "volume-2"} size={24} />
                                        </button>
                                    </div>
                                    <div className="prose prose-slate max-w-none space-y-6 text-lg text-slate-700 leading-relaxed">
                                        {LESSON_DATA.content.map((section, idx) => (
                                            <div key={idx}>
                                                <h3 className="text-xl font-bold text-indigo-700 mt-6 mb-2">{section.headingEn}</h3>
                                                <p className="hover:bg-indigo-50 p-2 rounded transition-colors group cursor-pointer" onClick={() => handleSpeak(section.contentEn)}>
                                                    {section.contentEn} <Icon name="play" size={14} className="inline opacity-0 group-hover:opacity-100 ml-1 text-indigo-400" />
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'translation' && (
                                <div className="space-y-8">
                                    {LESSON_DATA.content.map((section, idx) => (
                                        <section key={idx} className="grid grid-cols-1 md:grid-cols-2 gap-4 pb-6 border-b border-slate-100">
                                            <div className="bg-slate-50 p-4 rounded-xl">
                                                <h4 className="font-bold text-indigo-600 mb-2">{section.headingEn}</h4>
                                                <p className="text-slate-800 italic leading-relaxed">{section.contentEn}</p>
                                            </div>
                                            <div className="bg-indigo-50/30 p-4 rounded-xl">
                                                <h4 className="font-bold text-slate-500 mb-2">{section.headingZh}</h4>
                                                <p className="text-slate-800 leading-relaxed">{section.contentZh}</p>
                                            </div>
                                        </section>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'vocab_list' && (
                                <div className="overflow-x-auto rounded-xl border border-slate-200">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-100 text-slate-600 uppercase text-xs font-bold">
                                            <tr>
                                                <th className="p-4 border-b">單字 / 音標 / 詞性</th>
                                                <th className="p-4 border-b">翻譯</th>
                                                <th className="p-4 border-b">例句與發音</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {LESSON_DATA.vocabulary.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 transition-colors align-top">
                                                    <td className="p-4">
                                                        <div className="font-bold text-indigo-600 flex items-center gap-1">
                                                            {item.word} <button onClick={() => handleSpeak(item.word)} className="text-slate-300 hover:text-indigo-400 transition-colors"><Icon name="volume-2" size={14} /></button>
                                                        </div>
                                                        <div className="text-xs text-slate-400 font-mono mt-1">{item.ipa}</div>
                                                        <span className="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded uppercase font-bold mt-2 inline-block">{item.pos}</span>
                                                    </td>
                                                    <td className="p-4 font-bold text-slate-700">{item.trans}</td>
                                                    <td className="p-4">
                                                        <div className="bg-indigo-50/50 p-3 rounded text-sm italic border-l-4 border-indigo-200 group relative">
                                                            <div className="flex justify-between items-start">
                                                                <span>"{item.exEn}"</span>
                                                                <button onClick={() => handleSpeak(item.exEn)} className="text-indigo-400 hover:text-indigo-600 ml-2 opacity-50 hover:opacity-100 transition-all"><Icon name="volume-2" size={14} /></button>
                                                            </div>
                                                            <div className="text-xs text-slate-500 not-italic mt-1">{item.exZh}</div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeTab === 'flashcards' && (
                                <div className="flex flex-col items-center justify-center space-y-8 py-10">
                                    <div className="text-center font-bold text-indigo-600">Card {cardIndex + 1} / {LESSON_DATA.vocabulary.length}</div>
                                    <div className="relative w-full max-w-md h-72 cursor-pointer perspective-1000" onClick={() => setIsFlipped(!isFlipped)}>
                                        <div className={`relative w-full h-full transition-transform duration-500 preserve-3d ${isFlipped ? '[transform:rotateY(180deg)]' : ''}`}>
                                            <div className="absolute inset-0 bg-indigo-600 text-white rounded-3xl flex flex-col items-center justify-center p-8 backface-hidden shadow-xl text-center">
                                                <div className="absolute top-4 right-4">
                                                    <button onClick={(e) => { e.stopPropagation(); handleSpeak(LESSON_DATA.vocabulary[cardIndex].word); }} className="p-2 bg-white/20 rounded-full hover:bg-white/40 transition-colors"><Icon name="volume-2" size={20} /></button>
                                                </div>
                                                <h2 className="text-4xl font-bold mb-2">{LESSON_DATA.vocabulary[cardIndex].word}</h2>
                                                <p className="text-indigo-200 font-mono text-lg">{LESSON_DATA.vocabulary[cardIndex].ipa}</p>
                                            </div>
                                            <div className="absolute inset-0 bg-white border-2 border-indigo-600 rounded-3xl flex flex-col items-center justify-center p-8 backface-hidden [transform:rotateY(180deg)] shadow-xl overflow-hidden text-center">
                                                <div className="absolute top-4 right-4">
                                                    <button onClick={(e) => { e.stopPropagation(); handleSpeak(LESSON_DATA.vocabulary[cardIndex].exEn); }} className="p-2 bg-indigo-50 rounded-full hover:bg-indigo-100 text-indigo-600 transition-colors"><Icon name="volume-2" size={20} /></button>
                                                </div>
                                                <h3 className="text-3xl font-bold text-indigo-600 mb-4">{LESSON_DATA.vocabulary[cardIndex].trans}</h3>
                                                <div className="bg-slate-50 p-3 rounded-lg w-full text-sm">
                                                    <p className="italic mb-1 font-serif">"{LESSON_DATA.vocabulary[cardIndex].exEn}"</p>
                                                    <p className="text-slate-400">{LESSON_DATA.vocabulary[cardIndex].exZh}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => {setCardIndex(i => (i-1+LESSON_DATA.vocabulary.length)%LESSON_DATA.vocabulary.length); setIsFlipped(false)}} className="p-4 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors"><Icon name="chevron-left" /></button>
                                        <button onClick={() => setIsFlipped(!isFlipped)} className="px-8 py-3 bg-indigo-600 text-white rounded-full font-bold shadow-lg hover:bg-indigo-700 transition-colors">翻轉卡片</button>
                                        <button onClick={() => {setCardIndex(i => (i+1)%LESSON_DATA.vocabulary.length); setIsFlipped(false)}} className="p-4 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors"><Icon name="chevron-right" /></button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'grammar' && (
                                <div className="space-y-6">
                                    <h3 className="text-2xl font-bold text-slate-800 border-b pb-4">課程文法解析</h3>
                                    {LESSON_DATA.grammar.map((item, idx) => (
                                        <div key={idx} className="bg-white border-2 border-slate-50 rounded-2xl p-6 shadow-sm space-y-4 hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-2 text-indigo-600">
                                                <div className="bg-indigo-100 p-2 rounded-lg"><Icon name="lightbulb" size={24} /></div>
                                                <h4 className="font-bold text-xl">{item.title}</h4>
                                            </div>
                                            <p className="text-slate-600 text-lg">{item.desc}</p>
                                            <div className="bg-slate-50 p-4 rounded-xl border-l-4 border-indigo-400 flex justify-between items-start group">
                                                <div>
                                                    <p className="font-serif text-slate-800 italic text-lg">"{item.exEn}"</p>
                                                    <p className="text-sm text-slate-500 mt-2">{item.exZh}</p>
                                                </div>
                                                <button onClick={() => handleSpeak(item.exEn)} className="text-indigo-400 hover:text-indigo-600 opacity-0 group-hover:opacity-100 transition-all"><Icon name="volume-2" size={18} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'quiz' && (
                                <div className="space-y-8 py-4">
                                    {!showScore ? (
                                        <div className="space-y-8">
                                            {LESSON_DATA.quiz.map((q, qIdx) => (
                                                <div key={qIdx}>
                                                    <h3 className="text-xl font-bold mb-4 flex gap-2"><span className="bg-indigo-600 text-white px-3 py-1 rounded">{qIdx + 1}</span> {q.question}</h3>
                                                    <div className="grid grid-cols-1 gap-2 pl-12">
                                                        {q.options.map((opt, i) => (
                                                            <button key={i} onClick={() => setQuizAnswers({...quizAnswers, [qIdx]: i})} className={`text-left p-3 rounded-xl border-2 transition-all ${quizAnswers[qIdx] === i ? 'border-indigo-600 bg-indigo-50 shadow-inner' : 'border-slate-100 hover:border-slate-300'}`}>
                                                                {String.fromCharCode(65+i)}) {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={() => setShowScore(true)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg transition-all active:scale-95">提交並查看結果</button>
                                        </div>
                                    ) : (
                                        <div className="text-center space-y-6">
                                            <div className="text-6xl text-green-500"><Icon name="check-circle" size={80} className="mx-auto" /></div>
                                            <h3 className="text-3xl font-bold">測驗完成！</h3>
                                            <div className="text-left space-y-4 max-w-2xl mx-auto">
                                                {LESSON_DATA.quiz.map((q, i) => (
                                                    <div key={i} className={`p-4 rounded-xl border-2 ${quizAnswers[i] === q.correctIndex ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}`}>
                                                        <p className="font-bold">問題 {i+1}：{quizAnswers[i] === q.correctIndex ? '正確 ✅' : '錯誤 ❌'}</p>
                                                        <p className="text-sm mt-1">{q.explanation}</p>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => {setShowScore(false); setQuizAnswers({})}} className="px-8 py-3 border-2 border-indigo-600 text-indigo-600 rounded-full font-bold hover:bg-indigo-50 transition-colors">重新挑戰</button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>
                        <footer className="mt-8 text-center text-slate-400 text-sm pb-10">
                            © 2024 Interactive Learning Hub | 空氣污染：隱形的威脅
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
