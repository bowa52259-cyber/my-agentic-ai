<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空中英語互動學習 - 多篇切換版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .preserve-3d { transform-style: preserve-3d; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // --- 文章資料庫開始 ---
        const allArticles = [
            {
                id: 1,
                title: "Agentic AI 智慧代理人",
                content: [
                    {
                        headingEn: "What is agentic AI?",
                        headingZh: "什麼是智慧代理人？",
                        contentEn: "As artificial intelligence becomes more advanced, one of the newest developments is called agentic AI. Unlike traditional systems that simply answer questions, agentic AI can simplify large problems by breaking them into smaller steps.",
                        contentZh: "隨著人工智慧變得越來越先進，其中一項最新的發展被稱為智慧代理人。與僅僅回答問題的傳統系統不同，智慧代理人可以將大問題分解成更小的步驟。"
                    }
                ],
                vocab: [
                    { word: "advanced", pos: "adj.", ipa: "/ədˈvænst/", trans: "先進的", exEn: "Agentic AI is an advanced technology.", exZh: "智慧代理人是一項先進的技術。" }
                ]
            },
            {
                id: 2,
                title: "都柏林文化之旅",
                content: [
                    {
                        headingEn: "Explore Dublin's History",
                        headingZh: "探索都柏林的歷史",
                        contentEn: "Dublin is a city rich in history, from its Viking origins to its stunning Georgian architecture. It is known for its cultural heritage.",
                        contentZh: "都柏林是一座歷史悠久的城市，從維京起源到令人驚嘆的喬治亞風格建築。它以文化遺產聞名。"
                    }
                ],
                vocab: [
                    { word: "heritage", pos: "n.", ipa: "/ˈherɪtɪdʒ/", trans: "遺產；繼承物", exEn: "The city has a rich cultural heritage.", exZh: "這座城市擁有豐富的文化遺產。" },
                    { word: "stunning", pos: "adj.", ipa: "/ˈstʌnɪŋ/", trans: "極漂亮的；驚人的", exEn: "The architecture in Dublin is stunning.", exZh: "都柏林的建築美得令人驚嘆。" }
                ]
            }
        ];
        // --- 文章資料庫結束 ---

        const App = () => {
            const [articleIdx, setArticleIdx] = useState(0);
            const [activeTab, setActiveTab] = useState('article');
            const [cardIndex, setCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);

            const activeArticle = allArticles[articleIdx];

            const handleSpeak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.onstart = () => setIsSpeaking(true);
                    utterance.onend = () => setIsSpeaking(false);
                    window.speechSynthesis.speak(utterance);
                }
            };

            return (
                <div className="min-h-screen p-2 md:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-6 text-center">
                            <h1 className="text-3xl md:text-4xl font-bold text-indigo-700 mb-4">空中英語互動學習</h1>
                            
                            {/* 重要：切換文章的下拉選單 */}
                            <div className="flex justify-center items-center gap-2 bg-white p-3 rounded-xl shadow-sm max-w-sm mx-auto border-2 border-indigo-500">
                                <Icon name="book-open-check" className="text-indigo-500" />
                                <span className="text-sm font-bold text-slate-400">選擇文章：</span>
                                <select 
                                    value={articleIdx} 
                                    onChange={(e) => {
                                        setArticleIdx(Number(e.target.value));
                                        setCardIndex(0);
                                        setIsFlipped(false);
                                    }}
                                    className="bg-transparent font-bold text-indigo-700 outline-none cursor-pointer text-lg"
                                >
                                    {allArticles.map((art, index) => (
                                        <option key={art.id} value={index}>{art.title}</option>
                                    ))}
                                </select>
                            </div>
                        </header>

                        {/* 導覽列 */}
                        <nav className="flex justify-around mb-6 border-b border-slate-200">
                            {['article', 'vocab_list', 'flashcards'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-3 text-sm font-bold border-b-2 transition-colors ${activeTab === tab ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500'}`}>
                                    {tab === 'article' ? '原文內容' : tab === 'vocab_list' ? '重點單字' : '翻卡練習'}
                                </button>
                            ))}
                        </nav>

                        <main className="bg-white rounded-2xl shadow-md p-4 min-h-[500px]">
                            {activeTab === 'article' && (
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-4">{activeArticle.title}</h2>
                                    {activeArticle.content.map((sec, i) => (
                                        <div key={i} className="p-4 bg-slate-50 rounded-xl">
                                            <div className="flex justify-between items-center mb-2">
                                                <h3 className="font-bold text-indigo-700">{sec.headingEn}</h3>
                                                <button onClick={() => handleSpeak(sec.contentEn)} className="p-2 bg-indigo-100 rounded-full text-indigo-600"><Icon name="volume-2" /></button>
                                            </div>
                                            <p className="text-lg mb-2">{sec.contentEn}</p>
                                            <p className="text-slate-500 text-sm border-t pt-2">{sec.contentZh}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'vocab_list' && (
                                <div className="space-y-4">
                                    {activeArticle.vocab.map((v, i) => (
                                        <div key={i} className="p-4 border rounded-xl flex justify-between items-center">
                                            <div>
                                                <div className="font-bold text-indigo-600 text-xl">{v.word} <span className="text-xs font-normal text-slate-400">{v.ipa}</span></div>
                                                <div className="text-slate-700">{v.trans}</div>
                                                <div className="text-xs text-slate-400 italic mt-1">"{v.exEn}"</div>
                                            </div>
                                            <button onClick={() => handleSpeak(v.word)} className="p-3 bg-indigo-50 rounded-full text-indigo-600"><Icon name="volume-2" /></button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'flashcards' && (
                                <div className="flex flex-col items-center py-10">
                                    <div className="relative w-full max-w-xs h-80 cursor-pointer perspective-1000" onClick={() => setIsFlipped(!isFlipped)}>
                                        <div className={`relative w-full h-full transition-transform duration-500 preserve-3d ${isFlipped ? '[transform:rotateY(180deg)]' : ''}`}>
                                            <div className="absolute inset-0 bg-indigo-600 text-white rounded-3xl flex flex-col items-center justify-center p-6 backface-hidden shadow-xl text-center">
                                                <h2 className="text-4xl font-bold mb-4">{activeArticle.vocab[cardIndex].word}</h2>
                                                <button onClick={(e) => {e.stopPropagation(); handleSpeak(activeArticle.vocab[cardIndex].word)}} className="p-4 bg-white/20 rounded-full"><Icon name="volume-2" size={32} /></button>
                                            </div>
                                            <div className="absolute inset-0 bg-white border-4 border-indigo-600 rounded-3xl flex flex-col items-center justify-center p-6 backface-hidden [transform:rotateY(180deg)] shadow-xl text-center">
                                                <h3 className="text-3xl font-bold text-indigo-600 mb-4">{activeArticle.vocab[cardIndex].trans}</h3>
                                                <p className="text-slate-500 italic">"{activeArticle.vocab[cardIndex].exEn}"</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-10 mt-10">
                                        <button onClick={() => setCardIndex(p => (p-1+activeArticle.vocab.length)%activeArticle.vocab.length)} className="p-4 bg-slate-100 rounded-full"><Icon name="chevron-left" /></button>
                                        <button onClick={() => setCardIndex(p => (p+1)%activeArticle.vocab.length)} className="p-4 bg-slate-100 rounded-full"><Icon name="chevron-right" /></button>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
