<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動學習網頁：航海王 2026 再次啟航</title>
    <!-- 使用 CDN 引入 Tailwind CSS 進行樣式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 Babel 以在瀏覽器中運行 JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- 引入 Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .preserve-3d { transform-style: preserve-3d; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /**
         * ==========================================
         * 模板內容設定區 (LESSON_DATA)
         * ==========================================
         */
        const LESSON_DATA = {
            meta: {
                title: "航海王：2026 再次啟航",
                subtitle: "遇見那位戴著草帽、懷揣大夢想的海賊",
                series: "Anime & Manga",
                mainTitleEn: "ONE PIECE SETS SAIL AGAIN IN 2026",
                mainTitleZh: "《航海王》於 2026 年再次啟航"
            },
            // 全文對照數據
            content: [
                {
                    headingEn: "A Legend Returns",
                    headingZh: "傳奇回歸",
                    contentEn: "Get ready for an adventure on the high seas as the live-action series One Piece returns. The story, created by Japanese artist Eiichiro Oda, was released in 1997. Since then, Oda has written new chapters, and today there are over 1,000 in circulation. In addition to Japanese comics, or manga, the story has been told through animated shows and films called anime, and a live-action show.",
                    contentZh: "準備好在公海上展開一場冒險吧！真人版影集《航海王》回歸。這個故事由日本藝術家尾田榮一郎創作，於 1997 年問世。從那時起，尾田持續撰寫新章節，如今已有超過 1,000 話在市面上流通。除了漫畫之外，這個故事還透過動畫影集、電影以及真人版影集呈現。"
                },
                {
                    headingEn: "The Story of Luffy",
                    headingZh: "魯夫的故事",
                    contentEn: "One Piece tells the story of Monkey D. Luffy. His dream is to find the pirate treasure called 'One Piece' and become the Pirate King. As a boy, Luffy ate magical fruit that gave him rubber-like stretching abilities. As Luffy begins his adventure, he and his crew, the four original members, become known as the Straw Hat Pirates.",
                    contentZh: "《航海王》講述了蒙其·D·魯夫的故事。他的夢想是找到名為「One Piece」的寶藏並成為海賊王。魯夫小時候吃下了神奇的果實，賦予了他像橡膠一樣的伸縮能力。當魯夫開始冒險時，他和他的船員（最初的四位成員）被稱為「草帽海賊團」。"
                },
                {
                    headingEn: "Friendship and Dreams",
                    headingZh: "友誼與夢想",
                    contentEn: "No matter which version people read or watch, each one invites fans into a world of imagination. It's been nearly 30 years, and Luffy still hasn't found the treasure. But along the way, he's discovered something more significant — the value of friendship, freedom and the pursuit of one's dreams.",
                    contentZh: "無論人們閱讀或觀看哪一個版本，作品都邀請粉絲進入想像力的世界。至今已將近 30 年了，魯夫仍然沒有找到寶藏。但在過程中，他發現了更重要的東西——友誼的價值、自由以及對夢想的追求。"
                }
            ],
            // 單字清單
            vocabulary: [
                { word: "pirate", pos: "n.", ipa: "/ˈpaɪrət/", trans: "海盜、海賊", exEn: "The young boy dressed up as a pirate for the Halloween party.", exZh: "那個男孩為了萬聖節派對裝扮成海盜。" },
                { word: "circulation", pos: "n.", ipa: "/ˌsɜːrkjəˈleɪʃn/", trans: "流通、發行量", exEn: "The new currency has been in circulation since last month.", exZh: "新貨幣自上個月起開始流通。" },
                { word: "animated", pos: "adj.", ipa: "/ˈænɪmeɪtɪd/", trans: "動畫的", exEn: "Toy Story is one of the most famous animated movies in history.", exZh: "《玩具總動員》是史上最著名的動畫電影之一。" },
                { word: "magical", pos: "adj.", ipa: "/ˈmædʒɪkl/", trans: "神奇的、魔法的", exEn: "The forest looked magical under the bright moonlight.", exZh: "在明亮的月光下，這片森林看起來很神奇。" },
                { word: "crew", pos: "n.", ipa: "/kruː/", trans: "全體工作人員、船員", exEn: "The captain and his crew worked hard to save the sinking ship.", exZh: "船長和他的船員們努力拯救那艘下沉的船。" },
                { word: "imagination", pos: "n.", ipa: "/ɪˌmædʒɪˈneɪʃn/", trans: "想像力", exEn: "Children often have a very vivid imagination.", exZh: "小孩子通常有非常生動的想像力。" },
                { word: "significant", pos: "adj.", ipa: "/sɪɡˈnɪfɪkənt/", trans: "重要的、顯著的", exEn: "There has been a significant change in the weather recently.", exZh: "最近天氣有了顯著的變化。" },
                { word: "imaginary", pos: "adj.", ipa: "/ɪˈmædʒɪneri/", trans: "想像中的、虛構的", exEn: "The little girl has an imaginary friend named Bob.", exZh: "那個小女孩有一個名叫鮑伯的想像朋友。" },
                { word: "pursuit", pos: "n.", ipa: "/pərˈsuːt/", trans: "追求", exEn: "The pursuit of happiness is a fundamental human right.", exZh: "追求幸福是基本人權。" },
                { word: "manga / anime", pos: "n.", ipa: "/ˈmæŋɡə / ˈænɪmeɪ/", trans: "漫畫 / 動畫", exEn: "Many people around the world enjoy reading Japanese manga.", exZh: "全世界有許多人喜歡閱讀日本漫畫。" }
            ],
            // 文法重點
            grammar: [
                {
                    title: "In addition to + N/V-ing (除了...之外)",
                    desc: "用來補充或延伸句子的內容。後面若接動詞，必須使用動名詞 (V-ing)。",
                    exEn: "In addition to Japanese comics, the story has been told through films.",
                    exZh: "除了日本漫畫之外，這個故事還透過電影呈現。"
                },
                {
                    title: "Known as... (被稱為... / 以...為名)",
                    desc: "後接名稱、身分或角色。注意與 known for (因...聞名) 及 known to (為...所知) 的區別。",
                    exEn: "Luffy and his crew become known as the Straw Hat Pirates.",
                    exZh: "魯夫和他的船員被稱為草帽海賊團。"
                },
                {
                    title: "No matter + 疑問詞 (無論...)",
                    desc: "引導一個讓步狀語從句，表示「不論情況如何，結果都一樣」。",
                    exEn: "No matter which version people watch, they enjoy the imagination.",
                    exZh: "無論人們看哪一個版本，他們都享受其中的想像力。"
                }
            ],
            // 測驗題目
            quiz: [
                {
                    question: "According to the article, what has Luffy NOT found yet?",
                    options: [
                        "Magical fruit",
                        "The treasure 'One Piece'",
                        "The value of friendship",
                        "New crew members"
                    ],
                    correctIndex: 1,
                    explanation: "文中提到：魯夫仍然沒有找到名為 One Piece 的寶藏。"
                },
                {
                    question: "Luffy ate a special fruit that gave him rubber-like stretching __________.",
                    options: [
                        "strengths",
                        "abilities",
                        "dreams",
                        "fruits"
                    ],
                    correctIndex: 1,
                    explanation: "正確單字為 abilities (能力)。"
                },
                {
                    question: "Translate: 魯夫與他的船員被稱為「草帽海賊團」。",
                    options: [
                        "Luffy and his crew known for Pirates.",
                        "Luffy and his crew are known as the Straw Hat Pirates.",
                        "Luffy and his crew are known to the Pirates.",
                        "Luffy and his crew are known by the Pirates."
                    ],
                    correctIndex: 1,
                    explanation: "「被稱為...」應使用 be known as 結構。"
                }
            ]
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('article');
            const [cardIndex, setCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [quizAnswers, setQuizAnswers] = useState({});
            const [showScore, setShowScore] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);

            const handleSpeak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.onstart = () => setIsSpeaking(true);
                    utterance.onend = () => setIsSpeaking(false);
                    window.speechSynthesis.speak(utterance);
                }
            };

            const stopSpeaking = () => {
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
            };

            return (
                <div className="min-h-screen p-2 md:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-6 text-center">
                            <h1 className="text-3xl md:text-4xl font-bold text-indigo-700 mb-2">{LESSON_DATA.meta.title}</h1>
                            <p className="text-slate-500 italic">{LESSON_DATA.meta.subtitle}</p>
                        </header>

                        <nav className="flex flex-wrap gap-1 mb-6 border-b border-slate-200 overflow-x-auto whitespace-nowrap scrollbar-hide">
                            {[
                                { id: 'article', label: '原文閱讀', icon: 'book-open' },
                                { id: 'translation', label: '全文對照', icon: 'languages' },
                                { id: 'vocab_list', label: '重點單字', icon: 'list' },
                                { id: 'flashcards', label: '翻卡練習', icon: 'id-card' },
                                { id: 'grammar', label: '文法重點', icon: 'graduation-cap' },
                                { id: 'quiz', label: '互動測驗', icon: 'check-circle' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-4 py-3 text-sm font-medium border-b-2 transition-colors ${activeTab === tab.id ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-indigo-500'}`}>
                                    <Icon name={tab.icon} /> {tab.label}
                                </button>
                            ))}
                        </nav>

                        <main className="bg-white rounded-2xl shadow-md p-4 md:p-8 min-h-[600px]">
                            {/* 1. 原文閱讀 */}
                            {activeTab === 'article' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-500">
                                        <div>
                                            <p className="font-bold text-indigo-900">{LESSON_DATA.meta.series}</p>
                                            <h2 className="text-2xl font-bold text-indigo-800">{LESSON_DATA.meta.mainTitleEn}</h2>
                                        </div>
                                        <button onClick={() => isSpeaking ? stopSpeaking() : handleSpeak(LESSON_DATA.content.map(s => `${s.headingEn}. ${s.contentEn}`).join(' '))} className={`p-3 rounded-full text-white shadow transition-all ${isSpeaking ? 'bg-red-500 animate-pulse' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                            <Icon name={isSpeaking ? "square" : "volume-2"} size={24} />
                                        </button>
                                    </div>
                                    <div className="prose prose-slate max-w-none space-y-6 text-lg text-slate-700 leading-relaxed">
                                        {LESSON_DATA.content.map((section, idx) => (
                                            <div key={idx}>
                                                <h3 className="text-xl font-bold text-indigo-700 mt-6 mb-2">{section.headingEn}</h3>
                                                <p className="hover:bg-indigo-50 p-2 rounded transition-colors group cursor-pointer" onClick={() => handleSpeak(section.contentEn)}>
                                                    {section.contentEn} <Icon name="play" size={14} className="inline opacity-0 group-hover:opacity-100 ml-1 text-indigo-400" />
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 2. 全文對照 */}
                            {activeTab === 'translation' && (
                                <div className="space-y-8">
                                    {LESSON_DATA.content.map((section, idx) => (
                                        <section key={idx} className="grid grid-cols-1 md:grid-cols-2 gap-4 pb-6 border-b border-slate-100">
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                                                <h4 className="font-bold text-indigo-600 mb-2">{section.headingEn}</h4>
                                                <p className="text-slate-800 italic leading-relaxed">{section.contentEn}</p>
                                            </div>
                                            <div className="bg-indigo-50/30 p-4 rounded-xl border border-indigo-50">
                                                <h4 className="font-bold text-slate-500 mb-2">{section.headingZh}</h4>
                                                <p className="text-slate-800 leading-relaxed">{section.contentZh}</p>
                                            </div>
                                        </section>
                                    ))}
                                </div>
                            )}

                            {/* 3. 單字清單 */}
                            {activeTab === 'vocab_list' && (
                                <div className="overflow-x-auto rounded-xl border border-slate-200">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-100 text-slate-600 uppercase text-xs font-bold">
                                            <tr>
                                                <th className="p-4 border-b">單字 / 音標 / 詞性</th>
                                                <th className="p-4 border-b">翻譯</th>
                                                <th className="p-4 border-b">例句與發音</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {LESSON_DATA.vocabulary.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 transition-colors align-top">
                                                    <td className="p-4">
                                                        <div className="font-bold text-indigo-600 flex items-center gap-1">
                                                            {item.word} <button onClick={() => handleSpeak(item.word)} className="text-slate-300 hover:text-indigo-400 transition-colors"><Icon name="volume-2" size={14} /></button>
                                                        </div>
                                                        <div className="text-xs text-slate-400 font-mono mt-1">{item.ipa}</div>
                                                        <span className="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded uppercase font-bold mt-2 inline-block">{item.pos}</span>
                                                    </td>
                                                    <td className="p-4 font-bold text-slate-700">{item.trans}</td>
                                                    <td className="p-4">
                                                        <div className="bg-indigo-50/50 p-3 rounded text-sm italic border-l-4 border-indigo-200 group relative">
                                                            <div className="flex justify-between items-start gap-2">
                                                                <span>"{item.exEn}"</span>
                                                                <button onClick={() => handleSpeak(item.exEn)} className="text-indigo-400 hover:text-indigo-600 shrink-0"><Icon name="volume-2" size={14} /></button>
                                                            </div>
                                                            <div className="text-xs text-slate-500 not-italic mt-1">{item.exZh}</div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {/* 4. 翻卡練習 */}
                            {activeTab === 'flashcards' && (
                                <div className="flex flex-col items-center justify-center space-y-8 py-10">
                                    <div className="text-center font-bold text-indigo-600">Card {cardIndex + 1} / {LESSON_DATA.vocabulary.length}</div>
                                    <div className="relative w-full max-w-md h-72 cursor-pointer perspective-1000" onClick={() => setIsFlipped(!isFlipped)}>
                                        <div className={`relative w-full h-full transition-transform duration-500 preserve-3d ${isFlipped ? '[transform:rotateY(180deg)]' : ''}`}>
                                            <div className="absolute inset-0 bg-indigo-600 text-white rounded-3xl flex flex-col items-center justify-center p-8 backface-hidden shadow-xl text-center">
                                                <div className="absolute top-4 right-4">
                                                    <button onClick={(e) => { e.stopPropagation(); handleSpeak(LESSON_DATA.vocabulary[cardIndex].word); }} className="p-2 bg-white/20 rounded-full hover:bg-white/40"><Icon name="volume-2" size={20} /></button>
                                                </div>
                                                <h2 className="text-4xl font-bold mb-2">{LESSON_DATA.vocabulary[cardIndex].word}</h2>
                                                <p className="text-indigo-200 font-mono text-lg">{LESSON_DATA.vocabulary[cardIndex].ipa}</p>
                                            </div>
                                            <div className="absolute inset-0 bg-white border-2 border-indigo-600 rounded-3xl flex flex-col items-center justify-center p-8 backface-hidden [transform:rotateY(180deg)] shadow-xl overflow-hidden text-center">
                                                <div className="absolute top-4 right-4">
                                                    <button onClick={(e) => { e.stopPropagation(); handleSpeak(LESSON_DATA.vocabulary[cardIndex].exEn); }} className="p-2 bg-indigo-50 rounded-full hover:bg-indigo-100 text-indigo-600"><Icon name="volume-2" size={20} /></button>
                                                </div>
                                                <h3 className="text-2xl md:text-3xl font-bold text-indigo-600 mb-4">{LESSON_DATA.vocabulary[cardIndex].trans}</h3>
                                                <div className="bg-slate-50 p-3 rounded-lg w-full text-sm">
                                                    <p className="italic mb-1 font-serif">"{LESSON_DATA.vocabulary[cardIndex].exEn}"</p>
                                                    <p className="text-slate-400">{LESSON_DATA.vocabulary[cardIndex].exZh}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => {setCardIndex(i => (i-1+LESSON_DATA.vocabulary.length)%LESSON_DATA.vocabulary.length); setIsFlipped(false)}} className="p-4 bg-slate-100 rounded-full hover:bg-slate-200"><Icon name="chevron-left" /></button>
                                        <button onClick={() => setIsFlipped(!isFlipped)} className="px-8 py-3 bg-indigo-600 text-white rounded-full font-bold shadow-lg hover:bg-indigo-700">翻轉卡片</button>
                                        <button onClick={() => {setCardIndex(i => (i+1)%LESSON_DATA.vocabulary.length); setIsFlipped(false)}} className="p-4 bg-slate-100 rounded-full hover:bg-slate-200"><Icon name="chevron-right" /></button>
                                    </div>
                                </div>
                            )}

                            {/* 5. 文法重點 */}
                            {activeTab === 'grammar' && (
                                <div className="space-y-6">
                                    <h3 className="text-2xl font-bold text-slate-800 border-b pb-4">課程文法解析</h3>
                                    {LESSON_DATA.grammar.map((item, idx) => (
                                        <div key={idx} className="bg-white border-2 border-slate-50 rounded-2xl p-6 shadow-sm space-y-4 hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-2 text-indigo-600">
                                                <div className="bg-indigo-100 p-2 rounded-lg"><Icon name="lightbulb" size={24} /></div>
                                                <h4 className="font-bold text-xl">{item.title}</h4>
                                            </div>
                                            <p className="text-slate-600 text-lg">{item.desc}</p>
                                            <div className="bg-slate-50 p-4 rounded-xl border-l-4 border-indigo-400 flex justify-between items-start group">
                                                <div>
                                                    <p className="font-serif text-slate-800 italic text-lg">"{item.exEn}"</p>
                                                    <p className="text-sm text-slate-500 mt-2">{item.exZh}</p>
                                                </div>
                                                <button onClick={() => handleSpeak(item.exEn)} className="text-indigo-400 hover:text-indigo-600 opacity-0 group-hover:opacity-100 transition-all"><Icon name="volume-2" size={18} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* 6. 互動測驗 */}
                            {activeTab === 'quiz' && (
                                <div className="space-y-8 py-4">
                                    {!showScore ? (
                                        <div className="space-y-8">
                                            {LESSON_DATA.quiz.map((q, qIdx) => (
                                                <div key={qIdx}>
                                                    <h3 className="text-xl font-bold mb-4 flex gap-2"><span className="bg-indigo-600 text-white px-3 py-1 rounded">{qIdx + 1}</span> {q.question}</h3>
                                                    <div className="grid grid-cols-1 gap-2 pl-12">
                                                        {q.options.map((opt, i) => (
                                                            <button key={i} onClick={() => setQuizAnswers({...quizAnswers, [qIdx]: i})} className={`text-left p-3 rounded-xl border-2 transition-all ${quizAnswers[qIdx] === i ? 'border-indigo-600 bg-indigo-50 shadow-inner' : 'border-slate-100 hover:border-slate-300'}`}>
                                                                {String.fromCharCode(65+i)}) {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={() => setShowScore(true)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg transition-all active:scale-95">提交並查看結果</button>
                                        </div>
                                    ) : (
                                        <div className="text-center space-y-6">
                                            <div className="text-6xl text-green-500"><Icon name="check-circle" size={80} className="mx-auto" /></div>
                                            <h3 className="text-3xl font-bold">測驗完成！</h3>
                                            <div className="text-left space-y-4 max-w-2xl mx-auto">
                                                {LESSON_DATA.quiz.map((q, i) => (
                                                    <div key={i} className={`p-4 rounded-xl border-2 ${quizAnswers[i] === q.correctIndex ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}`}>
                                                        <p className="font-bold">問題 {i+1}：{quizAnswers[i] === q.correctIndex ? '正確 ✅' : '錯誤 ❌'}</p>
                                                        <p className="text-sm mt-1">{q.explanation}</p>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => {setShowScore(false); setQuizAnswers({})}} className="px-8 py-3 border-2 border-indigo-600 text-indigo-600 rounded-full font-bold hover:bg-indigo-50 transition-colors">重新挑戰</button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>
                        <footer className="mt-8 text-center text-slate-400 text-sm pb-10">
                            © 2024 Interactive Learning Hub | 航海王：2026 再次啟航
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
